name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  style-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy

      - name: Run quality gate
        run: |
          bash scripts/check_style.sh